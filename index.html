<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ideaHub | 數位花園</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* 變數設定 */
        :root {
            --bg-color: #FAF9F6;      /* 優雅米色 */
            --text-color: #292929;    /* 深灰色文字 */
            --primary-green: #2D5A27; /* 森林綠 */
            --accent-green: #E8F3E8;  /* 極淺綠 (區塊背景) */
            --secondary-text: #6B6B6B;
            --max-width: 700px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.8;
            padding: 0 20px;
        }

        /* 導覽列 */
        nav {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.5rem;
            color: var(--primary-green);
            text-decoration: none;
            font-weight: bold;
        }

        /* 文章容器 */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .post-header {
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .meta {
            color: var(--secondary-text);
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
        }

        .post-content {
            font-size: 1.15rem;
            margin-bottom: 60px;
            text-align: justify;
        }

        .post-content p { margin-bottom: 25px; }

        /* 訪客計數樣式 */
        .visitor-stats {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--primary-green);
            background: var(--accent-green);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* 留言區容器 */
        #comment-section {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #e0e0e0;
        }

        footer {
            text-align: center;
            padding: 60px 0;
            color: var(--secondary-text);
            font-size: 0.8rem;
        }

        /* 響應式微調 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            nav { padding: 20px 0; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">ideaHub</a>
        <div class="meta">
            <a href="https://github.com/你的帳號" style="color: inherit; text-decoration: none;">GitHub</a>
        </div>
    </nav>

    <main>
        <article>
            <header class="post-header">
                <h1>歡迎來到我的數位花園：ideaHub 的誕生</h1>
                <div class="meta">
                    <span>2026年4月6日</span>
                    <span>•</span>
                    <span>5 分鐘閱讀</span>
                    <span id="busuanzi_container_page_pv" style="display:none;">
                        • 閱讀量 <span id="busuanzi_value_page_pv"></span> 次
                    </span>
                </div>
            </header>

            <section class="post-content">
                <p>這是我的第一篇部落格文章。在這裡，我打算記錄關於技術、品牌管理以及個人成長的實驗點滴。</p>
                <p>之所以選擇<strong>米色與淡綠色</strong>，是希望在這個資訊爆炸的時代，提供一個像紙質書本一樣安靜的閱讀空間。</p>
                </section>
        </article>

        <div class="visitor-stats">
            本站總訪問量：<span id="busuanzi_value_site_pv"></span> 次
        </div>

        <section id="comment-section">
            <h3>交流與討論</h3>
            <br>
            <p style="font-size: 0.9rem; color: var(--secondary-text);">（留言系統載入中... 請參考下方說明設定）</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ideaHub. Powered by GitHub Pages.</p>
    </footer>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
